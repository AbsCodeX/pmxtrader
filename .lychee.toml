# Link checker for pmxtrader-owned markdown (see CI docs job)
max_concurrency = 8
timeout = 25
retry_wait_time = 5
max_retries = 2
accept = ["200", "403", "405", "429"]

exclude_path = [
  "pmxt/",
  "node_modules/",
  ".venv/",
  ".venv-cockpit/",
  "hermes/",
  "reviews/",
  "docs/reports/live-readiness.md",
  "docs/reports/dry-run-test.md",
]

exclude = [
  "^https?://127\\.0\\.0\\.1",
  "^https?://localhost",
  "^file://",
  "twitter\\.com/intent",
  "api\\.producthunt\\.com",
]
