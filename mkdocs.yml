site_name: pmxtrader
site_description: Documentation for pmxtrader — setup, usage, testing, and QA for human-gated prediction market operations.
site_url: https://abscodex.github.io/pmxtrader/
repo_url: https://github.com/AbsCodeX/pmxtrader
repo_name: AbsCodeX/pmxtrader
edit_uri: edit/main/docs/
copyright: Copyright &copy; Abigail

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: black
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.prev_next
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascript/extra.js

nav:
  - Home: README.md
  - Operations:
      - Overview: operations/index.md
      - Command reference: commands.md
      - Environment & safety: environment.md
      - Known risks: known-risks.md
      - Cockpit TUI: cockpit.md
      - Multi-agent workflow: multi-agent.md
      - LLM providers: providers.md
  - Venues:
      - Kalshi: kalshi-integration.md
      - Polymarket US: polymarket-us-integration.md
  - Engineering:
      - Architecture: architecture.md
      - Project structure: project-structure.md
      - Testing & CI: testing.md
      - Dependencies: dependencies.md
      - Decisions: decisions.md
  - Reference:
      - Official links: official-links.md
  - Reports:
      - About reports: reports/README.md
      - Live readiness: reports/live-readiness.md
      - Dry-run test: reports/dry-run-test.md

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AbsCodeX/pmxtrader
  footer:
    - title: Start here
      links:
        - Home: README.md
        - Operations overview: operations/index.md
    - title: Operations
      links:
        - Command reference: commands.md
        - Environment: environment.md
        - Known risks: known-risks.md
    - title: Venues
      links:
        - Kalshi: kalshi-integration.md
        - Polymarket US: polymarket-us-integration.md
    - title: Engineering
      links:
        - Architecture: architecture.md
        - Testing: testing.md
