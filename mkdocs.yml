site_name: pmxtrader
site_description: Prediction market trading with PMXT — CLI, dashboard, cockpit, and human-gated agents.
site_url: https://abscodex.github.io/pmxtrader/
repo_url: https://github.com/AbsCodeX/pmxtrader
repo_name: AbsCodeX/pmxtrader
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Operator guide:
      - Command reference: commands.md
      - Environment variables: environment.md
      - Known risks: known-risks.md
      - Cockpit TUI: cockpit.md
      - Multi-agent: multi-agent.md
      - LLM providers: providers.md
      - Kalshi: kalshi-integration.md
      - Polymarket US: polymarket-us-integration.md
  - Developer guide:
      - Architecture: architecture.md
      - Project structure: project-structure.md
      - Testing: testing.md
      - Dependencies: dependencies.md
      - Decisions: decisions.md
  - Reference:
      - Official links: official-links.md
  - Reports:
      - About reports: reports/README.md
      - Live readiness: reports/live-readiness.md
      - Dry-run test: reports/dry-run-test.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AbsCodeX/pmxtrader
