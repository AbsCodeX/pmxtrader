name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pip-audit
          pip install -r requirements-cockpit.txt
          pip install -r requirements-docs.txt
          pip install -r requirements-telegram.txt

      - name: Install markdownlint
        run: npm install --no-save markdownlint-cli2

      - name: Markdown lint
        run: npx markdownlint-cli2

      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config .lychee.toml README.md AGENTS.md LIVE_READINESS_REPORT.md DRY_RUN_TEST_REPORT.md docs/
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs site
        run: bash scripts/docs-build.sh

      - name: npm audit (root)
        run: npm audit --audit-level=high

      - name: pip-audit (cockpit)
        run: pip-audit -r requirements-cockpit.txt

      - name: Run secret scanner
        run: python scripts/pre_commit_secret_check.py

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Functionality smoke
        run: bash scripts/smoke-functionality.sh --skip-pytest

      - name: Run Ruff linter
        run: ruff check .

      - name: Run MyPy type checker
        run: mypy . --ignore-missing-imports
