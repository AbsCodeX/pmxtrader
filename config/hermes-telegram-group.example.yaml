# Example: Hermes Telegram GROUP menu (forum topics + quick commands)
# Merge into ~/.hermes/profiles/telegram/config.yaml under the keys shown.
# Restart Hermes gateway after editing.
#
# Get group chat_id: add @userinfobot to the group (negative, e.g. -1001234567890).
# Get topic thread_id: open topic in Telegram → URL ends with /thread_id

telegram:
  require_mention: true          # @Hermes or reply in group
  exclusive_bot_mentions: true
  extra:
    rich_messages: true
    group_topics:
      - chat_id: -1001234567890   # YOUR group supergroup id
        topics:
          - name: Ask Hermes
            thread_id: 1          # General topic (often 1)
            skill: pmxtrader-auto
          - name: Markets
            thread_id: 5
            skill: pmxtrader-scout
          - name: Portfolio
            thread_id: 8
            skill: pmxtrader-commands
          - name: Research
            thread_id: 12
            skill: pmxtrader-scout
          - name: Agents
            thread_id: 15
            skill: multi-agent-handoff
          - name: Settings
            thread_id: 18
            skill: pmxtrader-commands

# Zero-token shortcuts (optional) — type /portfolio in any chat
quick_commands:
  portfolio:
    type: exec
    command: cd /Users/astafford/pmxtrader && ./pmx balance && ./pmx poly balance
  preflight:
    type: exec
    command: cd /Users/astafford/pmxtrader && ./pmx preflight

# In ~/.hermes/profiles/telegram/.env (not committed):
# TELEGRAM_GROUP_ALLOWED_CHATS=-1001234567890
