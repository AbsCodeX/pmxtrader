{# OpenAI-style docs top bar — wordmark + toolbar slot (search / theme / GitHub) #}
{% set base = config.site_url | default('/') %}
<header class="pmx-topbar" role="banner">
  <div class="pmx-topbar__inner">
    <div class="pmx-topbar__brand">
      <a class="pmx-wordmark" href="{{ base }}" aria-label="pmxtrader home">pmxtrader</a>
      <span class="pmx-topbar__slash" aria-hidden="true">/</span>
      <span class="pmx-topbar__context">Docs</span>
    </div>
    <button
      type="button"
      class="pmx-topbar__menu"
      aria-expanded="false"
      aria-controls="__drawer"
      aria-label="Open navigation"
    >
      <span></span><span></span>
    </button>
    <a
      class="pmx-topbar__github"
      href="{{ config.repo_url | default('https://github.com/AbsCodeX/pmxtrader') }}"
      target="_blank"
      rel="noopener"
    >GitHub</a>
  </div>
</header>
